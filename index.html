<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩 うんこ2048</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { overscroll-behavior: none; }

:root {
  --bg: #fffbe6;
  --board: #c8a96e;
  --cell: #d9b980;
  --accent: #8b4513;
  --btn: #e8732a;
  --text: #5c2d00;
  --radius: 14px;
}

body {
  background: var(--bg);
  font-family: 'Kosugi Maru', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  background-image: radial-gradient(circle at 20% 20%, #fff3c0 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, #fde8b0 0%, transparent 50%);
}

.deco {
  position: fixed; font-size: 1.8rem; opacity: 0.12;
  pointer-events: none; animation: floatDeco 8s ease-in-out infinite;
}
.deco:nth-child(1){top:5%;left:8%;animation-delay:0s;}
.deco:nth-child(2){top:15%;right:6%;animation-delay:1.5s;}
.deco:nth-child(3){bottom:10%;left:5%;animation-delay:3s;}
.deco:nth-child(4){bottom:20%;right:9%;animation-delay:4.5s;}
.deco:nth-child(5){top:45%;left:3%;animation-delay:2s;}
@keyframes floatDeco {
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-14px) rotate(10deg);}
}

.container { width:100%; max-width:400px; position:relative; z-index:1; }

.header {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:14px;
}
.logo {
  font-size:2rem; font-weight:900; color:var(--accent);
  line-height:1; text-shadow: 2px 2px 0 #f5c842;
}
.logo .emoji { font-size:2.2rem; }

.scores { display:flex; gap:8px; }
.score-box {
  background: #fff; border-radius: var(--radius);
  padding:7px 14px; text-align:center;
  box-shadow: 0 2px 8px rgba(139,69,19,0.15);
  border: 2px solid #f5c842;
  min-width: 70px;
}
.score-label { font-size:0.6rem; color:#b07030; font-weight:700; letter-spacing:.05em; }
.score-value { font-size:1.2rem; font-weight:900; color:var(--text); }
.score-value.bump { animation: bump .2s ease; }
@keyframes bump {
  0%{transform:scale(1);}50%{transform:scale(1.3);color:#e8732a;}100%{transform:scale(1);}
}

.controls { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
.btn {
  flex:1; border:none; border-radius:var(--radius);
  padding:11px 0; font-family:'Kosugi Maru',sans-serif;
  font-size:0.95rem; font-weight:700; cursor:pointer;
  transition:transform .1s;
}
.btn:active { transform:scale(0.95); }
.btn-p { background:var(--btn); color:#fff; box-shadow:0 3px 10px rgba(232,115,42,.35); }
.btn-g { background:#fff; color:var(--text); box-shadow:0 2px 6px rgba(0,0,0,.1); border:2px solid #f5c842; }
.btn-g:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.btn-sm { padding:7px 12px; font-size:0.78rem; flex:none; }

.challenge { font-size:0.82rem; color:#b07030; margin-bottom:12px; text-align:center; }
.challenge strong { color:var(--accent); }

.board-wrap { position:relative; }
.board {
  background:var(--board);
  border-radius:18px; padding:10px;
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:8px;
  box-shadow: 0 6px 24px rgba(139,69,19,.25), 0 0 0 4px #f5c842;
}
.cell-bg { background:var(--cell); border-radius:10px; aspect-ratio:1; }

.tiles-layer {
  position:absolute; inset:10px;
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:8px; pointer-events:none;
}

.tile {
  border-radius:10px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  aspect-ratio:1; font-weight:900; overflow:hidden;
}
.tile.new { animation: tileIn .12s ease-out; }
.tile.merged { animation: tilePop .15s ease-out; }
@keyframes tileIn {
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
@keyframes tilePop {
  0%{transform:scale(1);}
  40%{transform:scale(1.18);}
  100%{transform:scale(1);}
}

.tile-emoji { font-size: clamp(0.8rem, 3.8vw, 1.2rem); line-height:1; text-align:center; }
.tile-num   { font-size: clamp(1.4rem, 7vw, 2.3rem); font-weight:900; color:inherit; line-height:1; margin-top:2px; }
.tile-num.sm{ font-size: clamp(1.1rem, 5.5vw, 1.75rem); margin-top:2px; }
.pg { display:grid; gap:1px; align-items:center; justify-items:center; width:88%; }
.pg1 { grid-template-columns:1fr; }
.pg2 { grid-template-columns:1fr 1fr; }
.pg3 { grid-template-columns:1fr 1fr; }
.pg4 { grid-template-columns:1fr 1fr; }
.pg span { font-size: clamp(0.9rem, 4.5vw, 1.4rem); line-height:1.1; }
.tile-val { font-size: clamp(1.4rem, 7vw, 2.3rem); font-weight:900; color:inherit; line-height:1; margin-top:2px; }
.tile-val.sm { font-size: clamp(1.1rem, 5.5vw, 1.75rem); margin-top:2px; }

.t2    { background:#fef9e7; color:#8b6914; }
.t4    { background:#fdebd0; color:#7b4f1a; }
.t8    { background:#f5cba7; color:#6e3a10; }
.t16   { background:#e59866; color:#fff; }
.t32   { background:#ca6f1e; color:#fff; }
.t64   { background:#a04000; color:#fff; }
.t128  { background:#7b241c; color:#ffd700; }
.t256  { background:#512e5f; color:#ffd700; }
.t512  { background:#1a5276; color:#ffd700; }
.t1024 { background:#1e8449; color:#ffd700; }
.t2048 { background:#1a1a1a; color:#ffd700; box-shadow:0 0 20px #ffd700 inset,0 0 20px #ffd700; }
.tbig  { background:#0a0a0a; color:#ff69b4; }

.overlay {
  position:fixed; inset:0;
  background:rgba(255,251,230,.9);
  backdrop-filter:blur(8px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; gap:10px;
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.overlay h2 { font-size:2.4rem; color:var(--accent); text-align:center; }
.overlay p  { font-size:1rem; color:#b07030; font-weight:700; }
.overlay .btn { padding:13px 40px; flex:none; min-width:170px; }
.overlay .big-emoji { font-size:4rem; animation:spin .6s ease; }
@keyframes spin { from{transform:rotate(-20deg) scale(.5);}to{transform:rotate(0) scale(1);} }

.hidden { display:none !important; }

.sound-btn {
  position:fixed; top:14px; right:14px; z-index:200;
  background:#fff; border:2px solid #f5c842; border-radius:50%;
  width:40px; height:40px; font-size:1.2rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>
</head>
<body>

<div class="deco">💩</div>
<div class="deco">💩</div>
<div class="deco">💩</div>
<div class="deco">💩</div>
<div class="deco">💩</div>

<button class="sound-btn" id="sound-btn" title="音ON/OFF">🔊</button>

<div class="container">
  <div class="header">
    <div class="logo"><span class="emoji">💩</span> うんこ<br>2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">スコア</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">ベスト</div>
        <div class="score-value" id="hi-score">0</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-p btn-sm" onclick="confirmNewGame()">💩 新しいゲーム</button>
    <button class="btn btn-g" id="undo-btn" onclick="undo()">↩ もどす</button>
  </div>

  <div class="challenge">目標: <strong id="challenge">でんせつのうんこ</strong> を作れ！</div>

  <div class="board-wrap">
    <div class="board">
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
    </div>
    <div class="tiles-layer" id="tiles"></div>
  </div>
</div>

<div class="overlay hidden" id="confirm-overlay">
  <div class="big-emoji">💩</div>
  <h2 style="font-size:1.6rem">ゲームをやめる？</h2>
  <p>今のゲームが終わっちゃうよ！</p>
  <button class="btn btn-p" style="flex:none;min-width:170px;padding:13px 0" onclick="doNewGame()">やめる！新しくする！</button>
  <button class="btn btn-g" style="flex:none;min-width:170px;padding:13px 0" onclick="document.getElementById('confirm-overlay').classList.add('hidden')">やっぱりつづける</button>
</div>

<div class="overlay hidden" id="win-overlay">
  <div class="big-emoji">👑</div>
  <h2>でんせつの<br>うんこ！！</h2>
  <p>2048を作ったぞ！すごい！！</p>
  <button class="btn btn-p" onclick="continueGame()">まだつづける！</button>
  <button class="btn btn-g" style="flex:none;min-width:170px;padding:13px 0" onclick="newGame()">もう一回！</button>
</div>

<div class="overlay hidden" id="over-overlay">
  <div class="big-emoji">😱</div>
  <h2>うごけない！<br>ゲームオーバー</h2>
  <p id="over-score">スコア: 0</p>
  <button class="btn btn-p" onclick="newGame()">もう一回！</button>
</div>

<script>
const TILE_DATA = {
  2:    {count:1, name:'ちびうんこ'},
  4:    {count:2, name:'ふたつうんこ'},
  8:    {count:3, name:'みっつうんこ'},
  16:   {count:4, name:'よっつうんこ'},
  32:   {icon:'🌋', name:'スーパーうんこ'},
  64:   {icon:'🔥', name:'メガうんこ'},
  128:  {icon:'⚡', name:'ギガうんこ'},
  256:  {icon:'🌈', name:'テラうんこ'},
  512:  {icon:'🌟', name:'レインボーうんこ'},
  1024: {icon:'👾', name:'スターうんこ'},
  2048: {icon:'👑', name:'でんせつのうんこ'},
};
function getTile(v){ return TILE_DATA[v] || {icon:'🚀', name:'チョーでんせつ'}; }

function buildTileHTML(v){
  const d = getTile(v);
  const numClass = v >= 1000 ? 'tile-val sm' : 'tile-val';
  if(d.count){
    const poops = Array(d.count).fill('<span>💩</span>').join('');
    return '<div class="pg pg'+d.count+'">'+poops+'</div><div class="'+numClass+'">'+v+'</div>';
  } else {
    return '<div class="tile-emoji">'+d.icon+'💩</div><div class="'+numClass+'">'+v+'</div>';
  }
}

let audioCtx = null;
let soundOn = true;
let audioUnlocked = false;

document.getElementById('sound-btn').addEventListener('click', ()=>{
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
});

function unlockAudio(){
  if(audioUnlocked) return;
  try{
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    const buf = audioCtx.createBuffer(1,1,22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
    audioUnlocked = true;
  }catch(e){}
}

document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('mousedown',  unlockAudio, {once:true});
document.addEventListener('keydown',    unlockAudio, {once:true});

function playSlide(){
  if(!soundOn||!audioCtx)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(400,t);
    o.frequency.exponentialRampToValueAtTime(220,t+0.07);
    g.gain.setValueAtTime(0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    o.start(t);o.stop(t+0.09);
  }catch(e){}
}

function playMerge(){
  if(!soundOn||!audioCtx)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const t=audioCtx.currentTime;
    [440,554,660].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type='square';
      o.frequency.value=f;
      const s=t+i*0.045;
      g.gain.setValueAtTime(0.12,s);
      g.gain.exponentialRampToValueAtTime(0.001,s+0.1);
      o.start(s);o.stop(s+0.11);
    });
  }catch(e){}
}

function playWin(){
  if(!soundOn||!audioCtx)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const t=audioCtx.currentTime;
    [523,659,784,1046].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type='triangle';o.frequency.value=f;
      const s=t+i*0.1;
      g.gain.setValueAtTime(0.2,s);
      g.gain.exponentialRampToValueAtTime(0.001,s+0.25);
      o.start(s);o.stop(s+0.26);
    });
  }catch(e){}
}

function playOver(){
  if(!soundOn||!audioCtx)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const t=audioCtx.currentTime;
    [330,247,196].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type='sawtooth';o.frequency.value=f;
      const s=t+i*0.22;
      g.gain.setValueAtTime(0.18,s);
      g.gain.exponentialRampToValueAtTime(0.001,s+0.3);
      o.start(s);o.stop(s+0.31);
    });
  }catch(e){}
}

const ROWS=4,COLS=4;
let grid,score,hiScore,prevGrid,prevScore,won,continueAfterWin;

function init(){
  hiScore=parseInt(localStorage.getItem('unko2048hi')||'0');
  updateHi(); newGame(); setupInput();
}

function isGameInProgress(){
  const winHidden = document.getElementById('win-overlay').classList.contains('hidden');
  const overHidden = document.getElementById('over-overlay').classList.contains('hidden');
  return overHidden && winHidden && (score > 0 || prevGrid !== null);
}

function confirmNewGame(){
  if(isGameInProgress()){
    document.getElementById('confirm-overlay').classList.remove('hidden');
  } else {
    newGame();
  }
}

function doNewGame(){
  document.getElementById('confirm-overlay').classList.add('hidden');
  newGame();
}

function newGame(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0;prevGrid=null;prevScore=0;won=false;continueAfterWin=false;
  updateScore();addRandom();addRandom();render(true);
  document.getElementById('win-overlay').classList.add('hidden');
  document.getElementById('over-overlay').classList.add('hidden');
  updateUndoBtn();
}

function addRandom(){
  const e=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!grid[r][c])e.push([r,c]);
  if(!e.length)return;
  const[r,c]=e[Math.floor(Math.random()*e.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function clone(g){return g.map(r=>[...r]);}

function move(dir){
  unlockAudio();
  const prev=clone(grid),ps=score;
  let moved=false,_merged=false;
  const slide=row=>{
    const nums=row.filter(x=>x),out=[];let i=0;
    while(i<nums.length){
      if(i+1<nums.length&&nums[i]===nums[i+1]){
        const v=nums[i]*2;out.push(v);score+=v;i+=2;_merged=true;
      }else{out.push(nums[i]);i++;}
    }
    while(out.length<COLS)out.push(0);return out;
  };
  if(dir==='left')  for(let r=0;r<ROWS;r++){const n=slide(grid[r]);if(n.join()!==grid[r].join())moved=true;grid[r]=n;}
  else if(dir==='right') for(let r=0;r<ROWS;r++){const n=slide([...grid[r]].reverse()).reverse();if(n.join()!==grid[r].join())moved=true;grid[r]=n;}
  else if(dir==='up')    for(let c=0;c<COLS;c++){const col=grid.map(r=>r[c]);const n=slide(col);if(n.join()!==col.join())moved=true;for(let r=0;r<ROWS;r++)grid[r][c]=n[r];}
  else if(dir==='down')  for(let c=0;c<COLS;c++){const col=grid.map(r=>r[c]);const n=slide([...col].reverse()).reverse();if(n.join()!==col.join())moved=true;for(let r=0;r<ROWS;r++)grid[r][c]=n[r];}
  if(moved){
    prevGrid=prev;prevScore=ps;
    updateScore();addRandom();render(false);
    updateUndoBtn();checkWin();checkOver();
    if(_merged)playMerge();else playSlide();
  }
}

function undo(){
  if(!prevGrid)return;
  grid=prevGrid;score=prevScore;prevGrid=null;
  updateScore();render(false);updateUndoBtn();
}

function checkWin(){
  if(won||continueAfterWin)return;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]>=2048){
    won=true;
    setTimeout(()=>{
      document.getElementById('win-overlay').classList.remove('hidden');
      playWin();
    },300);
  }
}
function continueGame(){continueAfterWin=true;document.getElementById('win-overlay').classList.add('hidden');}

function checkOver(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!grid[r][c])return;
    if(c+1<COLS&&grid[r][c]===grid[r][c+1])return;
    if(r+1<ROWS&&grid[r][c]===grid[r+1][c])return;
  }
  document.getElementById('over-score').textContent='スコア: '+score;
  document.getElementById('over-overlay').classList.remove('hidden');
  playOver();
}

function updateScore(){
  const el=document.getElementById('score');
  el.textContent=score;el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
  if(score>hiScore){hiScore=score;localStorage.setItem('unko2048hi',hiScore);updateHi();}
}
function updateHi(){document.getElementById('hi-score').textContent=hiScore;}
function updateUndoBtn(){document.getElementById('undo-btn').disabled=!prevGrid;}

function render(isNew){
  const layer=document.getElementById('tiles');
  layer.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const v=grid[r][c],div=document.createElement('div');
    if(v){
      const cls=v<=2048?'t'+v:'tbig';
      div.className='tile '+cls+(isNew?' new':'');
      div.innerHTML=buildTileHTML(v);
    }else{
      div.className='tile';div.style.background='transparent';
    }
    layer.appendChild(div);
  }
  let max=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]>max)max=grid[r][c];
  const next=max<2048?2048:max*2;
  const d=getTile(next);
  const ci=d.icon||'💩';document.getElementById('challenge').textContent=ci+' '+d.name;
}

function setupInput(){
  document.addEventListener('keydown',e=>{
    const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if(m[e.key]){e.preventDefault();move(m[e.key]);}
  });
  let tx,ty,startTime;
  document.addEventListener('touchstart',e=>{
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;startTime=Date.now();
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(Date.now()-startTime>500)return;
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
    move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
  },{passive:true});
}

init();
</script>

</body>
</html>
